<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskBoard — Kanban</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo-mark">KB</div>
      <div class="header-titles">
        <h1 class="app-title">TaskBoard</h1>
        <span class="app-subtitle">Kanban Manager</span>
      </div>
    </div>
    <div class="header-right">
      <div class="counter-badge">
        <span class="counter-label">Tasks</span>
        <span class="counter-value" id="taskCounter">0</span>
      </div>
      <div class="filter-group">
        <label class="filter-label" for="priorityFilter">Filter</label>
        <select id="priorityFilter" class="filter-select">
          <option value="all">All Priorities</option>
          <option value="high">🔴 High</option>
          <option value="medium">🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
  </header>

  <!-- ═══════════════ BOARD ═══════════════ -->
  <main class="board">

    <!-- TO DO -->
    <section class="column" id="todo">
      <div class="column-header">
        <div class="column-title-group">
          <span class="column-dot dot-todo"></span>
          <h2 class="column-title">To Do</h2>
          <span class="column-count" id="count-todo">0</span>
        </div>
      </div>
      <ul class="task-list" id="list-todo" data-column="todo"></ul>
      <button class="add-task-btn" data-column="todo">
        <span class="plus-icon">+</span> Add Task
      </button>
    </section>

    <!-- IN PROGRESS -->
    <section class="column" id="inprogress">
      <div class="column-header">
        <div class="column-title-group">
          <span class="column-dot dot-inprogress"></span>
          <h2 class="column-title">In Progress</h2>
          <span class="column-count" id="count-inprogress">0</span>
        </div>
      </div>
      <ul class="task-list" id="list-inprogress" data-column="inprogress"></ul>
      <button class="add-task-btn" data-column="inprogress">
        <span class="plus-icon">+</span> Add Task
      </button>
    </section>

    <!-- DONE -->
    <section class="column" id="done">
      <div class="column-header">
        <div class="column-title-group">
          <span class="column-dot dot-done"></span>
          <h2 class="column-title">Done</h2>
          <span class="column-count" id="count-done">0</span>
        </div>
        <button class="clear-done-btn" id="clearDoneBtn">Clear All</button>
      </div>
      <ul class="task-list" id="list-done" data-column="done"></ul>
      <button class="add-task-btn" data-column="done">
        <span class="plus-icon">+</span> Add Task
      </button>
    </section>

  </main>

  <!-- ═══════════════ MODAL ═══════════════ -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalHeading">
      <div class="modal-header">
        <h2 class="modal-title" id="modalHeading">New Task</h2>
        <button class="modal-close-btn" id="modalCloseBtn" aria-label="Close modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label" for="taskTitle">Title <span class="required">*</span></label>
          <input type="text" id="taskTitle" class="form-input" placeholder="What needs to be done?" maxlength="80" />
        </div>
        <div class="form-group">
          <label class="form-label" for="taskDesc">Description</label>
          <textarea id="taskDesc" class="form-textarea" placeholder="Add details, context, or notes…" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="taskPriority">Priority</label>
            <select id="taskPriority" class="form-select">
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="taskDue">Due Date</label>
            <input type="date" id="taskDue" class="form-input" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn">Save Task</button>
      </div>
      <!-- Hidden fields to track edit state -->
      <input type="hidden" id="editTaskId" value="" />
      <input type="hidden" id="editColumnId" value="" />
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
